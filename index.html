<!DOCTYPE html>

<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fingerprint POC</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #0f172a;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .tabs {
      display: flex;
    }

    .tab {
      flex: 1;
      padding: 18px;
      text-align: center;
      background: #1e293b;
      font-size: 16px;
      cursor: pointer;
    }

    .tab.active {
      background: #22c55e;
      color: black;
      font-weight: bold;
    }

    .content {
      flex: 1;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      padding: 20px;
      text-align: center;
    }

    .content.active {
      display: flex;
    }

    h2 {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      max-width: 400px;
      padding: 18px;
      font-size: 18px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
    }

    .register-btn {
      background: #f59e0b;
      color: black;
    }

    .verify-btn {
      background: #22c55e;
      color: black;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>

</head>

<body>

  <!-- Tabs -->

  <div class="tabs">
    <div class="tab active" onclick="switchTab('register')" id="tab-register">Register</div>
    <div class="tab" onclick="switchTab('verify')" id="tab-verify">Verify</div>
  </div>

  <!-- Register Tab -->

  <div id="register" class="content active">
    <h2>Register Fingerprint</h2>
    <button class="register-btn" onclick="register()">Touch Fingerprint</button>
  </div>

  <!-- Verify Tab -->

  <div id="verify" class="content">
    <h2>Verify Fingerprint</h2>
    <button class="verify-btn" onclick="verify()">Confirm</button>
    <div id="result"></div>
  </div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.content').forEach(c => c.classList.remove('active'));

  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById(tab).classList.add('active');
}

// REGISTER FLOW
async function register() {
  try {
    const publicKey = {
      challenge: new Uint8Array(32),

      rp: {
        name: "Demo App"
      },

      user: {
        id: new Uint8Array(16),
        name: "user@test.com",
        displayName: "User"
      },

      pubKeyCredParams: [
        { type: "public-key", alg: -7 }
      ],

      authenticatorSelection: {
        authenticatorAttachment: "platform",
        userVerification: "required"
      },

      timeout: 60000,
      attestation: "none"
    };

    const credential = await navigator.credentials.create({ publicKey });

    const credId = btoa(
      String.fromCharCode(...new Uint8Array(credential.rawId))
    );

    localStorage.setItem("credId", credId);

    alert("✅ Fingerprint Registered");

    // AUTO SWITCH
    switchTab('verify');

  } catch (err) {
    alert("❌ " + err.message);
  }
}

// VERIFY FLOW
async function verify() {
  try {
    const stored = localStorage.getItem("credId");

    if (!stored) {
      alert("No credential found");
      return;
    }

    const publicKey = {
      challenge: new Uint8Array(32),

      allowCredentials: [
        {
          id: Uint8Array.from(atob(stored), c => c.charCodeAt(0)),
          type: "public-key"
        }
      ],

      userVerification: "required",
      timeout: 60000
    };

    await navigator.credentials.get({ publicKey });

    document.getElementById("result").innerText = "✅ Verified Successfully";

  } catch (err) {
    document.getElementById("result").innerText = "❌ Verification Failed";
  }
}
</script>

</body>
</html>
