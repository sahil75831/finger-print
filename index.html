<!DOCTYPE html>

<html>
<head>
  <title>Fingerprint POC</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 40px;
    }

    button {
      padding: 14px 20px;
      margin: 10px;
      font-size: 16px;
      cursor: pointer;
      width: 80%;
      max-width: 300px;
    }

    .tab-btn {
      padding: 12px;
      cursor: pointer;
      display: inline-block;
      margin: 5px;
      border: 1px solid #ccc;
    }

    .active-tab {
      background: #ddd;
      font-weight: bold;
    }

    .tab {
      display: none;
      margin-top: 20px;
    }

    .active {
      display: block;
    }
  </style>

</head>

<body>

  <h2>Anti frau detection system</h2>

  <!-- Tabs -->

  <div>
    <span id="tab-register" style="display: none;" class="tab-btn active-tab" onclick="showTab('register')">Register</span>
    <span id="tab-login" style="display: none;" class="tab-btn" onclick="showTab('login')">Verify</span>
  </div>

  <!-- Register -->

  <div id="register" class="tab active">
    <h3>MTN Nigeria</h3>
    <button onclick="register()">click to confirm</button>
    <p id="registerStatus"></p>
  </div>

  <!-- Verify -->

  <div id="login" class="tab">
    <h3>Verify</h3>
    <button onclick="login()">Confirm</button>
    <p id="status"></p>
  </div>

<script>
function showTab(tabId) {
  document.getElementById('register').classList.remove('active');
  document.getElementById('login').classList.remove('active');

  document.getElementById('tab-register').classList.remove('active-tab');
  document.getElementById('tab-login').classList.remove('active-tab');

  document.getElementById(tabId).classList.add('active');

  if (tabId === 'register') {
    document.getElementById('tab-register').classList.add('active-tab');
  } else {
    document.getElementById('tab-login').classList.add('active-tab');
  }
}

function bufferToBase64(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)));
}

function base64ToBuffer(base64) {
  const binary = atob(base64);
  const buffer = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) {
    buffer[i] = binary.charCodeAt(i);
  }
  return buffer;
}

// REGISTER
async function register() {
  const statusEl = document.getElementById("registerStatus");

  try {
    const publicKey = {
      challenge: new Uint8Array(32),
      rp: { name: "POC App" },
      user: {
        id: new Uint8Array(16),
        name: "user@test.com",
        displayName: "User"
      },
      pubKeyCredParams: [{ type: "public-key", alg: -7 }],
      authenticatorSelection: {
        authenticatorAttachment: "platform",
        userVerification: "required"
      },
      timeout: 60000
    };

    const credential = await navigator.credentials.create({ publicKey });

    const id = bufferToBase64(credential.rawId);
    localStorage.setItem("credId", id);

    statusEl.innerText = "✅ Registered successfully";

    // ✅ AUTO SWITCH TO VERIFY TAB
    showTab('login');

  } catch (err) {
    statusEl.innerText = "❌ Registration failed";
  }
}

// VERIFY
async function login() {
  const status = document.getElementById("status");
  const storedId = localStorage.getItem("credId");

  if (!storedId) {
    status.innerText = "❌ Please register first";
    return;
  }

  try {
    const publicKey = {
      challenge: new Uint8Array(32),
      allowCredentials: [
        {
          id: base64ToBuffer(storedId),
          type: "public-key"
        }
      ],
      userVerification: "required",
      timeout: 60000
    };

    status.innerText = "👉 Touch fingerprint sensor...";

    await navigator.credentials.get({ publicKey });

    status.innerText = "✅ Verified Successfully";

  } catch (err) {
    status.innerText = "❌ Verification failed";
  }
}
</script>

</body>
</html>
