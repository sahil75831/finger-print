<!DOCTYPE html>
<html>
<head>
  <title>Passkey Subscription POC</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 350px;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .header {
      background: linear-gradient(45deg, #6a11cb, #2575fc);
      color: white;
      padding: 20px;
      font-weight: bold;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: #111;
      color: white;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 2px solid #4CAF50;
    }

    .price {
      font-size: 28px;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    .primary {
      background: #f5a623;
      color: white;
      font-weight: bold;
    }

    .secondary {
      background: #4CAF50;
      color: white;
    }

    .tabs button {
      width: 50%;
      border-radius: 0;
      background: #eee;
    }

    .activeTab {
      background: #ddd;
      font-weight: bold;
    }

    .tab {
      display: none;
    }

    .show {
      display: block;
    }

    .status {
      margin-top: 10px;
      font-weight: bold;
    }

    .success { color: green; }
    .error { color: red; }
  </style>
</head>
<body>

<div class="container">

  <div class="header">
    🔐 Hausa Basics Audio
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button id="tab1Btn" class="activeTab" onclick="switchTab(1)">Subscribe</button>
    <button id="tab2Btn" onclick="switchTab(2)">Confirm</button>
  </div>

  <!-- TAB 1 -->
  <div id="tab1" class="content tab show">
    <h3>Choose Your Pack</h3>

    <div class="card">
      <div>WEEKLY</div>
      <div class="price">₦150</div>
      <div>per week</div>
    </div>

    <button class="primary" onclick="register()">
      Subscribe with Fingerprint
    </button>

    <div id="registerStatus" class="status"></div>
  </div>

  <!-- TAB 2 -->
  <div id="tab2" class="content tab">
    <h3>Confirm Subscription</h3>

    <button class="secondary" onclick="verify()">
      Confirm with Fingerprint
    </button>

    <div id="verifyStatus" class="status"></div>
  </div>

</div>

<script>
  function switchTab(tab) {
    document.getElementById("tab1").classList.remove("show");
    document.getElementById("tab2").classList.remove("show");

    document.getElementById("tab1Btn").classList.remove("activeTab");
    document.getElementById("tab2Btn").classList.remove("activeTab");

    if (tab === 1) {
      document.getElementById("tab1").classList.add("show");
      document.getElementById("tab1Btn").classList.add("activeTab");
    } else {
      document.getElementById("tab2").classList.add("show");
      document.getElementById("tab2Btn").classList.add("activeTab");
    }
  }

  function bufferToBase64(buffer) {
    return btoa(String.fromCharCode(...new Uint8Array(buffer)));
  }

  function base64ToBuffer(base64) {
    const binary = atob(base64);
    const buffer = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) {
      buffer[i] = binary.charCodeAt(i);
    }
    return buffer;
  }

  async function register() {
    const status = document.getElementById("registerStatus");

    try {
      const publicKey = {
        challenge: new Uint8Array(32),
        rp: { name: "Subscription App" },
        user: {
          id: new Uint8Array(16),
          name: "user@test.com",
          displayName: "User"
        },
        pubKeyCredParams: [{ type: "public-key", alg: -7 }],
        authenticatorSelection: {
          authenticatorAttachment: "platform",
          userVerification: "required"
        }
      };

      status.innerText = "👉 Touch fingerprint sensor...";

      const credential = await navigator.credentials.create({ publicKey });

      const id = bufferToBase64(credential.rawId);
      localStorage.setItem("credId", id);

      status.className = "status success";
      status.innerText = "✅ Subscription Activated!";
    } catch (err) {
      console.error(err);
      status.className = "status error";
      status.innerText = "❌ Failed";
    }
  }

  async function verify() {
    const status = document.getElementById("verifyStatus");
    const storedId = localStorage.getItem("credId");

    if (!storedId) {
      status.className = "status error";
      status.innerText = "❌ No subscription found";
      return;
    }

    try {
      const publicKey = {
        challenge: new Uint8Array(32),
        allowCredentials: [{
          id: base64ToBuffer(storedId),
          type: "public-key"
        }],
        userVerification: "required"
      };

      status.innerText = "👉 Verify fingerprint...";

      await navigator.credentials.get({ publicKey });

      status.className = "status success";
      status.innerText = "✅ Verified Successfully!";
    } catch (err) {
      console.error(err);
      status.className = "status error";
      status.innerText = "❌ Verification Failed";
    }
  }
</script>

</body>
</html>
